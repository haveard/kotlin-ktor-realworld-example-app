# Boots the app and runs the RealWorld (Conduit) Postman collection against it
# via Newman, exercising the live HTTP API end to end.

name: Spec API (Newman)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Start server
        run: ./gradlew run &

      - name: Wait for server to accept requests
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://localhost:8080/tags"; then
              echo "Server is up."
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done
          echo "Server did not become ready in time." >&2
          exit 1

      - name: Run API tests
        env:
          APIURL: http://localhost:8080
        run: ./spec-api/run-api-tests.sh
