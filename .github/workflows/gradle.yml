# This workflow builds the Kotlin/Ktor project with Gradle across a JDK matrix
# and publishes JUnit test results to the checks/PR page.
# Third-party actions are governed by their own terms; see their repositories.

name: CI with Gradle

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 21 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and test
        run: ./gradlew build test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit tests (JDK ${{ matrix.java }})
          path: build/test-results/**/*.xml
          reporter: java-junit
